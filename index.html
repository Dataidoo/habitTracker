<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Habit Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16537E">
<script>if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");</script>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #16537E;
  --sl: #1e6494;
  --sd: #0f3f60;
  --tp: #CFE2F3;
  --ts: #8ab4d4;
  --accent: #CFE2F3;
  --font: 'Baloo 2', sans-serif;
  --font-h: 'Nunito', sans-serif;
  --r: 20px;
  --rs: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  font-family: var(--font);
  color: var(--tp);
  min-height: 100vh;
  padding: 20px 16px 100px;
  transition: background 0.5s ease;
  -webkit-font-smoothing: antialiased;
}

/* NEO */
.neo  { box-shadow: 7px 7px 16px var(--sd), -4px -4px 12px var(--sl); border-radius: var(--r); background: var(--bg); }
.neos { box-shadow: 5px 5px 10px var(--sd), -3px -3px 8px var(--sl); border-radius: var(--rs); background: var(--bg); }
.neoi { box-shadow: inset 4px 4px 10px var(--sd), inset -2px -2px 7px var(--sl); border-radius: var(--r); background: var(--bg); }

/* HEADER */
.header { text-align: center; margin-bottom: 18px; padding-top: 4px; }
.logo-wrap {
  width: 80px; height: 80px; border-radius: 50%;
  margin: 0 auto 10px;
  box-shadow: 6px 6px 14px var(--sd), -4px -4px 10px var(--sl);
  overflow: hidden; background: rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
}
.logo-wrap img { width: 75%; height: 75%; object-fit: contain; filter: brightness(0) invert(0.9); transition: filter 0.5s; }
.header h1 {
  font-family: var(--font-h); font-size: 1.6rem; font-weight: 900;
  color: var(--accent); letter-spacing: 0.5px;
}
.checkin-sub { font-size: 0.82rem; color: var(--ts); margin-top: 2px; font-weight: 600; }

/* PHASE TABS */
.phase-tabs {
  display: flex; gap: 6px; margin-bottom: 16px;
  padding: 6px;
  box-shadow: inset 4px 4px 10px var(--sd), inset -2px -2px 7px var(--sl);
  border-radius: var(--r); background: var(--bg);
}
.phase-tab {
  flex: 1; padding: 12px 4px; border: none;
  background: transparent; border-radius: var(--rs);
  font-family: var(--font-h); font-size: 0.78rem; font-weight: 800;
  color: var(--ts); cursor: pointer; transition: all 0.25s;
  line-height: 1.3; letter-spacing: 0.02em;
}
.phase-tab.active {
  box-shadow: 5px 5px 10px var(--sd), -3px -3px 8px var(--sl);
  color: var(--accent); background: var(--bg);
}

/* CARD */
.card { background: var(--bg); border-radius: var(--r); padding: 18px; margin-bottom: 14px;
  box-shadow: 7px 7px 16px var(--sd), -4px -4px 12px var(--sl); }
.slabel {
  font-family: var(--font-h); font-size: 0.7rem; font-weight: 800;
  text-transform: uppercase; letter-spacing: 1.4px;
  color: var(--ts); margin-bottom: 14px;
}

/* MFE CARD — portrait face + stop sliders side by side */
.mfe-card {
  background: var(--bg); border-radius: var(--r); padding: 16px; margin-bottom: 14px;
  box-shadow: 7px 7px 16px var(--sd), -4px -4px 12px var(--sl);
  display: flex; gap: 16px; align-items: stretch;
}

/* Portrait face */
.face-wrap {
  flex: 0 0 160px;
  display: flex; flex-direction: column; align-items: center;
}
.face-frame {
  width: 160px; height: 213px; border-radius: 18px;
  box-shadow: inset 4px 4px 10px var(--sd), inset -2px -2px 7px var(--sl);
  padding: 8px; background: var(--bg);
}
.face-inner {
  width: 100%; height: 100%; border-radius: 10px;
  overflow: hidden; position: relative; background: rgba(0,0,0,0.15);
}
.face-inner img {
  width: 100%; height: 100%; object-fit: cover;
  position: absolute; top:0; left:0;
  transition: opacity 0.4s ease-in-out;
}
.face-inner img.hidden { opacity: 0; }
.face-inner img.visible { opacity: 1; }

/* Stop-button sliders */
.mfe-controls {
  flex: 1; display: flex; flex-direction: column; justify-content: space-around; gap: 6px;
}
.stop-slider { display: flex; flex-direction: column; gap: 4px; }
.stop-slider-head {
  display: flex; align-items: center; gap: 6px;
}
.stop-slider-head img {
  width: 18px; height: 18px; object-fit: contain;
  filter: brightness(0) invert(0.6);
}
.stop-slider-head .sname {
  font-size: 0.72rem; font-weight: 800; color: var(--ts);
  font-family: var(--font-h); text-transform: uppercase; letter-spacing: 0.8px;
  flex: 1;
}
.stop-slider-head .sval {
  font-size: 0.72rem; font-weight: 800; color: var(--accent);
  font-family: var(--font-h);
}
.stop-track {
  position: relative; height: 22px; border-radius: 999px;
  box-shadow: inset 4px 4px 8px var(--sd), inset -2px -2px 6px var(--sl);
  background: var(--bg);
  display: flex; align-items: center; padding: 0 14px;
}
.stop-buttons {
  position: absolute; inset: 0 14px;
  display: flex; justify-content: space-between; align-items: center;
}
.stop-btn {
  width: 30px; height: 22px; background: transparent;
  border: none; cursor: pointer; display: grid; place-items: center;
  padding: 0;
}
.stop-btn::after {
  content: ""; width: 6px; height: 6px; border-radius: 50%;
  background: var(--sd); transition: opacity 0.2s;
}
.stop-btn.filled::after { opacity: 0; }
.stop-thumb {
  position: absolute; top: 50%;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--bg);
  box-shadow: 3px 3px 8px var(--sd), -2px -2px 6px var(--sl);
  transform: translate(-50%, -50%);
  transition: left 0.3s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none;
}
.stop-thumb::before {
  content: ""; position: absolute; inset: 7px;
  border-radius: 50%; background: var(--accent);
  box-shadow: 0 0 6px rgba(207,226,243,0.5);
}
.stop-ticks {
  display: flex; justify-content: space-between; padding: 0 3px;
}
.stop-ticks span {
  font-size: 0.65rem; font-weight: 700; color: var(--ts);
  font-family: var(--font-h); text-transform: uppercase;
  letter-spacing: 0.05em; cursor: pointer; transition: color 0.2s;
  width: 36px; text-align: center;
}
.stop-ticks span.active { color: var(--accent); }

/* SLEEP — custom track */
.sleep-row { display: flex; align-items: center; gap: 14px; }
.sleep-icon {
  flex: 0 0 52px; height: 52px; border-radius: 14px;
  box-shadow: 5px 5px 10px var(--sd), -3px -3px 8px var(--sl);
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
}
.sleep-icon img {
  width: 28px; height: 28px; object-fit: contain;
  filter: brightness(0) invert(0.6);
}
.sleep-slider { flex: 1; display: flex; flex-direction: column; gap: 10px; }
.sleep-val-row {
  display: flex; align-items: baseline; gap: 4px;
}
.sleep-num {
  font-family: var(--font-h); font-size: 2rem; font-weight: 900;
  color: var(--accent); line-height: 1; min-width: 32px;
}
.sleep-unit {
  font-size: 0.8rem; font-weight: 600; color: var(--ts);
}
.sleep-track {
  position: relative; height: 22px; border-radius: 999px;
  background: var(--bg);
  box-shadow: inset 4px 4px 8px var(--sd), inset -2px -2px 6px var(--sl);
  cursor: pointer; touch-action: none;
}
.sleep-fill {
  position: absolute; top: 4px; left: 4px; height: 14px;
  border-radius: 999px;
  background: linear-gradient(90deg, rgba(207,226,243,0.4), rgba(207,226,243,0.85));
  min-width: 14px; transition: width 0.18s cubic-bezier(.22,.61,.36,1);
}
.sleep-thumb {
  position: absolute; top: 50%; width: 30px; height: 30px;
  border-radius: 50%; background: var(--bg);
  box-shadow: 3px 3px 8px var(--sd), -2px -2px 6px var(--sl);
  transform: translate(-50%, -50%);
  transition: left 0.18s cubic-bezier(.22,.61,.36,1);
  display: grid; place-items: center; cursor: grab;
}
.sleep-thumb::after {
  content: ""; width: 10px; height: 10px; border-radius: 50%;
  background: var(--accent); opacity: 0.85;
}
.sleep-ticks {
  display: flex; justify-content: space-between; padding: 0 2px;
}
.sleep-ticks span {
  font-size: 0.65rem; font-weight: 700; color: var(--ts);
  font-family: var(--font-h); width: 14px; text-align: center;
}
.sleep-ticks span.on { color: var(--accent); }

/* TOGGLES */
.toggles-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
}
.toggle-btn {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 14px 4px; border: none; border-radius: var(--rs);
  background: var(--bg);
  box-shadow: 5px 5px 10px var(--sd), -3px -3px 8px var(--sl);
  cursor: pointer; font-family: var(--font-h);
  font-size: 0.64rem; font-weight: 800; letter-spacing: 0.03em;
  color: var(--ts); transition: all 0.2s; text-transform: uppercase;
}
.toggle-btn .t-icon {
  width: 34px; height: 34px; object-fit: contain;
  filter: brightness(0) invert(0.5); transition: filter 0.2s;
}
.toggle-btn.active {
  box-shadow: inset 3px 3px 8px var(--sd), inset -2px -2px 6px var(--sl);
  color: var(--accent);
}
.toggle-btn.active .t-icon { filter: brightness(0) invert(0.88); }
.toggle-btn.locked { opacity: 0.5; cursor: not-allowed; }

/* CONSUMPTION */
.consumption-row { display: flex; flex-direction: column; gap: 16px; }
.cons-row { display: flex; align-items: center; gap: 14px; }
.cons-icon-btn {
  flex: 0 0 48px; height: 48px; border-radius: 12px;
  box-shadow: 5px 5px 10px var(--sd), -3px -3px 8px var(--sl);
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
}
.cons-icon-btn img {
  width: 26px; height: 26px; object-fit: contain;
  filter: brightness(0) invert(0.6);
}
.cons-slider { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.cons-val-row {
  display: flex; justify-content: space-between; align-items: baseline;
}
.cons-label { font-size: 0.72rem; font-weight: 800; color: var(--ts); font-family: var(--font-h); text-transform: uppercase; letter-spacing: 0.05em; }
.cons-val { font-size: 1.1rem; font-weight: 900; color: var(--accent); font-family: var(--font-h); }
.cons-track {
  position: relative; height: 18px; border-radius: 999px;
  background: var(--bg);
  box-shadow: inset 3px 3px 7px var(--sd), inset -2px -2px 5px var(--sl);
  cursor: pointer; touch-action: none;
}
.cons-fill {
  position: absolute; top: 3px; left: 3px; height: 12px;
  border-radius: 999px;
  background: linear-gradient(90deg, rgba(207,226,243,0.3), rgba(207,226,243,0.75));
  min-width: 12px; transition: width 0.15s;
}
.cons-thumb {
  position: absolute; top: 50%; width: 24px; height: 24px;
  border-radius: 50%; background: var(--bg);
  box-shadow: 3px 3px 6px var(--sd), -2px -2px 5px var(--sl);
  transform: translate(-50%, -50%);
  transition: left 0.15s; display: grid; place-items: center;
}
.cons-thumb::after {
  content:""; width:8px; height:8px; border-radius:50%;
  background: var(--accent); opacity:0.8;
}
.cons-range-labels {
  display: flex; justify-content: space-between;
  font-size: 0.62rem; font-weight: 700; color: var(--ts); padding: 0 2px;
}

/* QUOTE */
.quote-card {
  background: var(--bg); border-radius: var(--r); padding: 16px 20px;
  margin-bottom: 14px;
  box-shadow: inset 4px 4px 10px var(--sd), inset -2px -2px 7px var(--sl);
  text-align: center;
}
.quote-text { font-size: 0.8rem; font-weight: 500; color: var(--ts); line-height: 1.65; font-style: italic; }
.quote-author { font-size: 0.7rem; font-weight: 800; color: var(--accent); margin-top: 6px; font-family: var(--font-h); }

/* SUBMIT */
.submit-btn {
  width: 100%; padding: 16px; border: none; border-radius: var(--r);
  background: var(--bg);
  box-shadow: 7px 7px 16px var(--sd), -4px -4px 12px var(--sl);
  font-family: var(--font-h); font-size: 1.05rem; font-weight: 900;
  color: var(--accent); cursor: pointer; transition: all 0.2s; margin-bottom: 12px;
  letter-spacing: 0.05em; text-transform: uppercase;
}
.submit-btn:active { box-shadow: inset 4px 4px 10px var(--sd), inset -2px -2px 7px var(--sl); }
.submit-btn.sent { color: #68d499; }

/* TOAST */
.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--bg);
  box-shadow: 7px 7px 16px var(--sd), -4px -4px 12px var(--sl);
  border-radius: var(--r); padding: 12px 28px;
  font-family: var(--font-h); font-weight: 800; color: #68d499;
  transition: transform 0.3s; z-index: 100; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>

let currentPhase = 'morning';
let toggleStates = {};
let pillLocked = false;
let mfeVals = { mood:1, focus:1, energy:1 };
let currentFaceKey = '';
let consVals = { redbull:0, smokes:0 };
let sleepVal = 7;

/* ── PHASE ── */
function applyPhase(phase) {
  const p = PHASES[phase];
  const r = document.documentElement.style;
  r.setProperty('--bg', p.color);
  r.setProperty('--sl', p.sl);
  r.setProperty('--sd', p.sd);
}

function setPhase(phase) {
  currentPhase = phase;
  document.getElementById('checkinLabel').textContent = PHASES[phase].label;
  document.querySelectorAll('.phase-tab').forEach((t,i) => {
    t.classList.toggle('active', ['morning','lunch','dinner','bedtime'][i] === phase);
  });
  applyPhase(phase);
  setQuote();
}

/* ── MFE STOP SLIDERS ── */
function buildMFE() {
  const wrap = document.getElementById('mfeControls');
  wrap.innerHTML = '';
  MFE_DEFS.forEach(def => {
    const el = document.createElement('div');
    el.className = 'stop-slider';
    el.innerHTML = `
      <div class="stop-slider-head">
        <img src="${def.icon}" alt="${def.label}">
        <span class="sname">${def.label}</span>
        <span class="sval" id="sval_${def.id}">Med</span>
      </div>
      <div class="stop-track">
        <div class="stop-thumb" id="sthumb_${def.id}"></div>
        <div class="stop-buttons">
          <button class="stop-btn" data-id="${def.id}" data-i="0" aria-label="Low"></button>
          <button class="stop-btn" data-i="1" data-id="${def.id}" aria-label="Med"></button>
          <button class="stop-btn" data-i="2" data-id="${def.id}" aria-label="High"></button>
        </div>
      </div>
      <div class="stop-ticks">
        <span data-id="${def.id}" data-i="0">Low</span>
        <span data-id="${def.id}" data-i="1">Med</span>
        <span data-id="${def.id}" data-i="2">High</span>
      </div>`;
    wrap.appendChild(el);

    function setMFEVal(id, level) {
      mfeVals[id] = level;
      document.getElementById('sval_'+id).textContent = LABELS[level];
      const thumb = document.getElementById('sthumb_'+id);
      thumb.style.left = `calc(14px + (100% - 28px) * ${level / 2})`;
      el.querySelectorAll('.stop-btn').forEach((b,i) => b.classList.toggle('filled', i <= level));
      el.querySelectorAll('.stop-ticks span').forEach((s,i) => s.classList.toggle('active', i === level));
      updateFace();
    }

    // Init no transition
    const thumb = document.getElementById('sthumb_'+def.id);
    thumb.style.transition = 'none';
    setMFEVal(def.id, 1); // default Med
    requestAnimationFrame(() => { thumb.style.transition = ''; });

    el.querySelectorAll('.stop-btn, .stop-ticks span').forEach(node => {
      node.addEventListener('click', () => setMFEVal(def.id, +node.dataset.i));
    });
  });
}

/* ── FACE ── */
function updateFace() {
  const m = LABELS[mfeVals.mood][0];
  const f = LABELS[mfeVals.focus][0];
  const e = LABELS[mfeVals.energy][0];
  const key = `${m}-${f}-${e}`;
  if (key === currentFaceKey) return;
  currentFaceKey = key;
  morphFace(key);
}

function morphFace(key) {
  const cur = document.getElementById('faceImg');
  const nxt = document.getElementById('faceImgNext');
  const src = FACE_MAP[key];
  if (!src) return;
  nxt.src = src;
  nxt.classList.remove('hidden'); nxt.classList.add('visible');
  cur.classList.remove('visible'); cur.classList.add('hidden');
  setTimeout(() => {
    cur.src = src;
    cur.classList.remove('hidden'); cur.classList.add('visible');
    nxt.classList.remove('visible'); nxt.classList.add('hidden');
  }, 420);
}

/* ── SLEEP ── */
function buildSleep() {
  const track = document.getElementById('sleepTrack');
  const fill  = document.getElementById('sleepFill');
  const thumb = document.getElementById('sleepThumb');
  const ticks = document.getElementById('sleepTicks');
  for (let i=0;i<=10;i++) {
    const s = document.createElement('span');
    s.textContent = i; s.dataset.tick = i; ticks.appendChild(s);
  }
  function renderSleep() {
    const pct = sleepVal / 10;
    const usable = track.clientWidth - 8;
    const x = 4 + pct * usable;
    fill.style.width = Math.max(14, x - 4 + 7) + 'px';
    thumb.style.left = x + 'px';
    // sleepNum removed
    ticks.querySelectorAll('span').forEach(s => s.classList.toggle('on', +s.dataset.tick === sleepVal));
  }
  function valFromX(clientX) {
    const rect = track.getBoundingClientRect();
    const pct = Math.min(1, Math.max(0, (clientX - rect.left - 4) / (rect.width - 8)));
    return Math.round(pct * 10);
  }
  let dragging = false;
  track.addEventListener('pointerdown', e => {
    dragging = true; track.setPointerCapture(e.pointerId);
    sleepVal = valFromX(e.clientX); renderSleep();
  });
  window.addEventListener('pointermove', e => {
    if (!dragging) return;
    sleepVal = valFromX(e.clientX); renderSleep();
  });
  window.addEventListener('pointerup', () => { dragging = false; });
  window.addEventListener('resize', renderSleep);
  requestAnimationFrame(renderSleep);
}

/* ── TOGGLES ── */
function buildToggles() {
  const grid = document.getElementById('togglesGrid');
  grid.innerHTML = '';
  TOGGLES.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'toggle-btn';
    btn.id = 'toggle_' + t.id;
    btn.innerHTML = `<img class="t-icon" src="${t.icon}" alt="${t.label}"><span>${t.label}</span>`;
    if (t.pillLock && pillLocked) { btn.classList.add('active','locked'); toggleStates[t.id]=true; }
    btn.onclick = function() {
      if (t.pillLock) {
        if (pillLocked) return;
        toggleStates[t.id]=true; btn.classList.add('active','locked');
        pillLocked=true; localStorage.setItem('pillLockDate', new Date().toDateString());
        return;
      }
      toggleStates[t.id] = !toggleStates[t.id];
      btn.classList.toggle('active', toggleStates[t.id]);
    };
    grid.appendChild(btn);
  });
}

/* ── CONSUMPTION ── */
function buildConsumption() {
  const row = document.getElementById('consRow');
  row.innerHTML = '';
  CONS_DEFS.forEach(def => {
    const wrap = document.createElement('div');
    wrap.className = 'cons-row';
    wrap.innerHTML = `
      <div class="cons-icon-btn"><img src="${def.icon}" alt="${def.label}"></div>
      <div class="cons-slider">
        <div class="cons-val-row">
          <span class="cons-label">${def.label}</span>
          <span class="cons-val" id="cval_${def.id}">0</span>
        </div>
        <div class="cons-track" id="ctrack_${def.id}">
          <div class="cons-fill" id="cfill_${def.id}"></div>
          <div class="cons-thumb" id="cthumb_${def.id}"></div>
        </div>

      </div>`;
    row.appendChild(wrap);

    const track = document.getElementById('ctrack_'+def.id);
    const fill  = document.getElementById('cfill_'+def.id);
    const thumb = document.getElementById('cthumb_'+def.id);

    function renderCons() {
      const pct = consVals[def.id] / def.max;
      const usable = track.clientWidth - 6;
      const x = 3 + pct * usable;
      fill.style.width = Math.max(12, x - 3 + 6) + 'px';
      thumb.style.left = x + 'px';
      document.getElementById('cval_'+def.id).textContent = consVals[def.id];
    }
    function valFromX(clientX) {
      const rect = track.getBoundingClientRect();
      const pct = Math.min(1, Math.max(0, (clientX - rect.left - 3) / (rect.width - 6)));
      return Math.round(pct * def.max);
    }
    let dragging = false;
    track.addEventListener('pointerdown', e => {
      dragging=true; track.setPointerCapture(e.pointerId);
      consVals[def.id]=valFromX(e.clientX); renderCons();
    });
    window.addEventListener('pointermove', e => {
      if (!dragging) return;
      consVals[def.id]=valFromX(e.clientX); renderCons();
    });
    window.addEventListener('pointerup', () => { dragging=false; });
    window.addEventListener('resize', renderCons);
    requestAnimationFrame(renderCons);
  });
}

/* ── QUOTE ── */
function setQuote() {
  const q = QUOTES[Math.floor(Math.random()*QUOTES.length)].split('|');
  document.getElementById('quoteText').innerHTML =
    `"${q[0]}"<div class="quote-author">— ${q[1]}</div>`;
}

/* ── DATA ── */
function getFormData() {
  const now = new Date();
  return {
    timestamp: now.toISOString(), date: now.toLocaleDateString(),
    time: now.toLocaleTimeString(), phase: currentPhase,
    mood: LABELS[mfeVals.mood], focus: LABELS[mfeVals.focus], energy: LABELS[mfeVals.energy],
    sleep_hrs: sleepVal,
    redbull: consVals.redbull, smokes: consVals.smokes,
    toggles: Object.entries(toggleStates).filter(([k,v])=>v).map(([k])=>k).join(', ')||'none'
  };
}

function saveState() {
  localStorage.setItem('habit_state', JSON.stringify({
    date: new Date().toDateString(), phase: currentPhase,
    mfe: {...mfeVals}, sleep: sleepVal,
    cons: {...consVals}, toggles: {...toggleStates}
  }));
  localStorage.setItem('habit_lastSubmit_'+currentPhase, JSON.stringify(getFormData()));
}

function loadState() {
  const saved = localStorage.getItem('habit_state');
  if (!saved) return;
  const s = JSON.parse(saved);
  if (s.date !== new Date().toDateString()) { localStorage.removeItem('habit_state'); return; }
  setPhase(s.phase);
  if (s.mfe) {
    mfeVals = s.mfe;
    ['mood','focus','energy'].forEach(id => {
      const thumb = document.getElementById('sthumb_'+id);
      if (thumb) {
        thumb.style.transition='none';
        const el = thumb.closest('.stop-slider');
        if (el) {
          document.getElementById('sval_'+id).textContent = LABELS[mfeVals[id]];
          thumb.style.left = `calc(14px + (100% - 28px) * ${mfeVals[id]/2})`;
          el.querySelectorAll('.stop-btn').forEach((b,i)=>b.classList.toggle('filled',i<=mfeVals[id]));
          el.querySelectorAll('.stop-ticks span').forEach((t,i)=>t.classList.toggle('active',i===mfeVals[id]));
        }
        requestAnimationFrame(()=>{ thumb.style.transition=''; });
      }
    });
    updateFace();
  }
  if (s.sleep !== undefined) sleepVal = s.sleep;
  if (s.cons) consVals = s.cons;
  if (s.toggles) {
    toggleStates = s.toggles;
    TOGGLES.forEach(t => {
      const btn = document.getElementById('toggle_'+t.id);
      if (btn && toggleStates[t.id]) {
        btn.classList.add('active');
        if (t.pillLock) btn.classList.add('locked');
      }
    });
  }
}

function formatBody(d) {
  return `HABIT TRACKER SUBMISSION\n========================\nDate: ${d.date}\nTime: ${d.time}\nPhase: ${d.phase.toUpperCase()}\n\nMOOD/FOCUS/ENERGY\nMood: ${d.mood}\nFocus: ${d.focus}\nEnergy: ${d.energy}\n\nSLEEP: ${d.sleep_hrs} hrs\nRED BULL: ${d.redbull}\nSMOKES: ${d.smokes}\n\nACTIVITIES\n${d.toggles}\n\nRAW JSON\n${JSON.stringify(d,null,2)}`;
}

function submitEntry() {
  saveState();
  const d = getFormData();
  window.location.href = `mailto:${SUBMIT_EMAIL}?subject=${encodeURIComponent('[HABIT] '+d.date+' - '+d.phase)}&body=${encodeURIComponent(formatBody(d))}`;
  const btn = document.getElementById('submitBtn');
  btn.textContent = 'Opening Mail...';
  setTimeout(()=>{
    btn.textContent='✓ Submitted'; btn.classList.add('sent');
    showToast('Check-in saved ✓');
    setTimeout(()=>{btn.textContent='Submit Check-in';btn.classList.remove('sent');},3000);
  },1500);
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function initPillLock() {
  pillLocked = localStorage.getItem('pillLockDate') === new Date().toDateString();
}

// INIT
initPillLock();
buildMFE();
buildSleep();
buildToggles();
buildConsumption();
loadState();
setQuote();
applyPhase('morning');
</script>
